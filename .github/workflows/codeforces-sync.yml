name: Sincronização do Codeforces

on:
  schedule:
   
    - cron: '0 */12 * * *' 
  workflow_dispatch: 


jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v3

      - name: Baixar Soluções do Codeforces e Fazer Commit
        uses: k0ng2/codeforces-sync-action@v1.0.1 
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          codeforces_handle: 'marelo_o' 
          folder_name: 'Solucoes' 
